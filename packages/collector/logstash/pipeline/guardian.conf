input {
  beats {
    port => 5044
    type => "guardian-threat"
  }
}

filter {
  # Validate HMAC envelope — quarantine if not verified
  if [guardian][envelope][verified] == false {
    mutate {
      add_field => { "[guardian][policy]" => "quarantine" }
      add_tag    => ["hmac_failed"]
    }
  }

  # PII redaction (ADR-0006)
  mutate {
    remove_field => ["[guardian][evidence][userId]", "[host][ip]"]
  }

  # Pseudonymise deviceId
  if [guardian][evidence][deviceId] {
    fingerprint {
      source  => "[guardian][evidence][deviceId]"
      target  => "[guardian][evidence][deviceId]"
      method  => "SHA256"
    }
  }

  # Truncate location to city level
  mutate {
    remove_field => ["[guardian][evidence][location][lat]", "[guardian][evidence][location][lon]"]
  }

  # Map guardian fields to ECS
  mutate {
    add_field => {
      "[event][kind]"     => "event"
      "[service][name]"   => "guardian-rn"
    }
  }
}

output {
  elasticsearch {
    hosts     => ["${ELASTICSEARCH_HOSTS}"]
    user      => "${ELASTICSEARCH_USER}"
    password  => "${ELASTICSEARCH_PASSWORD}"
    data_stream => true
    data_stream_type  => "logs"
    data_stream_dataset => "guardian.threat"
    data_stream_namespace => "%{[guardian][tenantId]}"
  }
}
