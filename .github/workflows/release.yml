name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write  # Required for GitHub Release creation
  id-token: write  # Required for npm provenance attestation

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Codegen (verify artefacts are fresh)
        run: npm run codegen && git diff --exit-code

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  publish:
    name: Publish
    needs: verify
    runs-on: ubuntu-latest
    environment: npm-publish  # Requires manual approval in GitHub Environments

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Bump package version (if not already set)
        run: |
          CURRENT=$(node -p "require('./packages/guardian-rn/package.json').version")
          TARGET="${{ steps.version.outputs.VERSION }}"
          if [ "$CURRENT" != "$TARGET" ]; then
            npm version "$TARGET" --workspace=packages/guardian-rn --no-git-tag-version
          else
            echo "Version already set to $TARGET — skipping bump"
          fi

      - name: Build
        run: npm run build

      - name: Publish to npm (with provenance)
        run: |
          npm publish --workspace=packages/guardian-rn \
            --provenance \
            --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
